version: '3.8'

services:
  telemetry-db:
    image: postgres:18
    container_name: telemetry-db
    environment:
      - POSTGRES_DB=telemetry_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5438:5432"
    volumes:
      - telemetry-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemetry_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aqua-network

  device-db:
    image: postgres:18
    container_name: device-db
    environment:
      - POSTGRES_DB=device_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5439:5432"
    volumes:
      - device-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d device_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aqua-network

  control-db:
      image: postgres:18
      container_name: control-db
      environment:
        - POSTGRES_DB=control-db
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=password
      ports:
        - "5440:5432"
      volumes:
        - control-db-data:/var/lib/postgresql
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d control_db"]
        interval: 5s
        timeout: 5s
        retries: 5
      networks:
        - aqua-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"  
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aqua-network
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  telemetry-api:
    container_name: telemetry-api
    image: telemetry-api
    build:
      context: . 
      dockerfile: src/Services/TelemetryService/TelemetryService/Dockerfile
    ports:
      - "5051:8080"
    depends_on:
      telemetry-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080  
      - ConnectionStrings__SystemDbContext=Host=telemetry-db;Database=telemetry_db;Username=postgres;Password=password
      - MessageBroker__Host=amqp://rabbitmq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MT_LICENSE=community  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aqua-network

  device-api:
    container_name: device-api
    image: device-api 
    build:
      context: . 
      dockerfile: src/Services/DeviceService/DeviceService/Dockerfile
    ports:
      - "5052:8080"
    depends_on:
      device-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__SystemDbContext=Host=device-db;Database=device_db;Username=postgres;Password=password
      - MessageBroker__Host=amqp://rabbitmq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MT_LICENSE=community  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aqua-network

  control-api:
    container_name: control-api
    image: control-api
    build:
      context: . 
      dockerfile: src/Services/ControlService/Control.API/Dockerfile
    ports:
      - "5053:8080"
    depends_on:
      control-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__SystemDbContext=Host=control-db;Database=control_db;Username=postgres;Password=password
      - MessageBroker__Host=amqp://rabbitmq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MT_LICENSE=community
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - aqua-network

networks:
  aqua-network:
    driver: bridge

volumes:
  telemetry-db-data:
  device-db-data:
  control-db-data: